# ═══════════════════════════════════════════════════════════════════════════
# Axolotl Config — Sancta Security Analyst Fine-Tuning
# Target: NVIDIA 1660Ti 6GB VRAM | QLoRA 4-bit | Llama 3.2 1B
# ═══════════════════════════════════════════════════════════════════════════

# ── Base Model ─────────────────────────────────────────────────────────────
base_model: meta-llama/Llama-3.2-1B-Instruct
model_type: LlamaForCausalLM
tokenizer_type: AutoTokenizer
trust_remote_code: true

# ── QLoRA (4-bit quantization — fits in 6GB) ──────────────────────────────
load_in_4bit: true
adapter: qlora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_target_linear: true

# ── Dataset ───────────────────────────────────────────────────────────────
datasets:
  - path: training_corpus.jsonl
    type: sharegpt
    conversation: chatml

# ── Chat Template ─────────────────────────────────────────────────────────
chat_template: chatml

# ── Training Hyperparameters ──────────────────────────────────────────────
# Tuned for 6GB VRAM — micro_batch_size=1 is essential
num_epochs: 3
micro_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2e-4
lr_scheduler: cosine
warmup_ratio: 0.05
optimizer: adamw_bnb_8bit
weight_decay: 0.01
max_grad_norm: 1.0

# ── Sequence Length ───────────────────────────────────────────────────────
# 512 keeps VRAM under 6GB. Most training pairs are < 400 tokens.
sequence_len: 512

# ── Memory Optimization (critical for 6GB) ────────────────────────────────
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
bf16: false                    # 1660Ti is Turing — no bf16 support
fp16: true                     # Use fp16 instead
tf32: false                    # Not available on Turing

# ── No flash-attn (requires Ampere+, 1660Ti is Turing sm_75) ─────────────
flash_attention: false
xformers_attention: false
sdp_attention: true            # Scaled dot-product — works on all GPUs

# ── Logging & Checkpoints ────────────────────────────────────────────────
output_dir: ./sancta-lora-out
logging_steps: 10
save_strategy: epoch
eval_strategy: "no"            # Skip eval to save VRAM
save_total_limit: 2

# ── Misc ──────────────────────────────────────────────────────────────────
seed: 42
pad_to_sequence_len: true
sample_packing: false          # Disable to save VRAM
wandb_project: sancta-finetune
wandb_mode: disabled           # Set to "online" if you use W&B
